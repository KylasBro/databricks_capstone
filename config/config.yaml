# ============================================================
# Education ETL Pipeline Configuration
# ============================================================
# This configuration file defines paths and table names for the
# school enrollment ETL pipeline using medallion architecture.
# ============================================================

# Unity Catalog Settings
# ----------------------
# Three-level namespace for Unity Catalog tables
unity_catalog:
  catalog: capstone_kailas              # Unity Catalog name
  schema: school_data                   # Schema (database) within the catalog

# Unity Catalog Table Names (fully qualified)
# --------------------------------------------
# Format: catalog.schema.table_name
tables:
  bronze_table: capstone_kailas.school_data.bronze_enrollment      # Raw enrollment records
  silver_table: capstone_kailas.school_data.silver_enrollment      # Cleaned enrollment records
  gold_table: capstone_kailas.school_data.gold_yearly_summary      # Yearly enrollment aggregations

# Legacy DBFS Paths (for reference)
# ----------------------------------
# These paths can still be used for external data storage if needed
paths:
  bronze: dbfs:/mnt/bronze/school_enrollment  # Raw data layer (as-is from source)
  silver: dbfs:/mnt/silver/school_enrollment  # Cleaned and transformed data
  gold: dbfs:/mnt/gold/school_enrollment      # Aggregated business-ready data